<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta
      name="description"
      content="Vacancy Watch — Interactive map of anomalous vacant properties in Montgomery, AL."
    />
    <title>Vacancy Watch — Montgomery Property Anomaly Map</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/index.css" />

            http://localhost

        your basemap tile quota.
        ══════════════════════════════════════════════════════════════════════
    -->
    <script>
      var esriConfig = {
        apiKey: "AAPTaZ46B5RpBDIsl45xa4HmS5A..1MjxpTeLKqWTbc5uz8VTKnbMiXjtM_NF1EKbdD8MidDZSDrHFKmq30qlXP1ATERDAvY4pEfCjH4urXa9KtI32Bbadxf3qVuqCHvzSVgRPiQDoHQ9lqwh02Gs3P58QO34eC3nRmMhpwZ6PghCUBw3OGoH77uCtHNs7Iv1vbJcRmZvU0XHRsvjMmBjDpLpRJwxTSpLVLRqtasGQ2QNm22s6iRFqpbBZVAagVn1mzIuJBjyigKWiKdaptjxAT1_DvBbvun8",
      };

    <!-- Load ArcGIS Maps SDK for JavaScript v5.0 from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
  </head>

  <body>
    <!-- SEO: single h1, visually hidden — map is the full page -->
    <h1 class="sr-only">Vacancy Watch — Montgomery, AL Property Anomaly Map</h1>

    <!-- ── Layout: Map + Executive Panel ─────────────────────── -->
    <div id="app-layout">

      <!-- Map canvas (Module 3.1) -->
      <arcgis-map
        id="map-view"
        basemap="arcgis/topographic"
        center="-86.2999, 32.3668"
        zoom="13"
      >
        <arcgis-zoom position="top-left"></arcgis-zoom>
      </arcgis-map>

      <!-- Mobile Tab Bar (Module 3.4 / Fix 5) -->
      <nav id="mobile-tabs" class="mobile-tabs">
        <button class="tab-btn tab-active" data-panel="exec-panel">Table</button>
        <button class="tab-btn" data-panel="detail-panel">Detail</button>
      </nav>

      <!-- Executive Detail Panel (Module 3.2) -->
      <aside id="detail-panel">
        <header class="panel-header">
          <h2>Anomaly Detail</h2>
        </header>

        <div id="panel-content" class="panel-body">
          <p class="panel-placeholder">Click a pin on the map to inspect anomaly details.</p>
        </div>
      </aside>

      <!-- Executive Table Panel (Module 3.4) -->
      <section id="exec-panel">
        <header class="exec-header">
          <h2>Top Anomalies</h2>
          <span id="exec-count" class="exec-count"></span>
        </header>
        
        <!-- Filter Controls (Fix Request) -->
        <div class="exec-filters">
          <select id="type-filter" class="filter-select">
            <option value="">All Types</option>
            <option value="zombie_property">Zombie Property</option>
            <option value="ghost_permit">Ghost Permit</option>
            <option value="government_blind_spot">Government Blind Spot</option>
          </select>
          <select id="filter-score" class="filter-select">
            <option value="">All Scores</option>
            <option value="4">Medium+ (Score 4+)</option>
            <option value="7">Critical (Score 7+)</option>
          </select>
        </div>

        <div class="exec-table-wrap">
          <table id="anomaly-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Address</th>
                <th>Type</th>
                <th>Score</th>
              </tr>
            </thead>
            <tbody id="anomaly-tbody">
              <!-- Populated by app.js -->
            </tbody>
          </table>
        </div>
      </section>

    </div>

    <!-- Application logic (Module 3.2) -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
